services:
  challenge:
    build: ./challenge
    container_name: shiro-challenge
    ports:
      - "8080:8080"
    volumes:
      - user_players:/home/ctf/players
      - root_players:/root/players
    environment:
      - LEADERBOARD_URL=http://localhost:80
    restart: unless-stopped
    cap_add:
      - SYS_ADMIN
    privileged: true

  leaderboard:
    build: ./leaderboard
    container_name: leaderboard
    ports:
      - "80:5000"
    volumes:
      - user_players:/data/normal:ro
      - root_players:/data/root:ro
    environment:
      - CHALLENGE_URL=http://localhost:8080
    restart: unless-stopped
    depends_on:
      - challenge

volumes:
  user_players:
  root_players:
