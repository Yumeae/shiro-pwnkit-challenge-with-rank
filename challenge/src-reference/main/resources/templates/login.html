<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>登录 — MazeQuest 迷境探索</title>
    <link rel="preconnect" href="https://fonts.loli.net" />
    <link rel="preconnect" href="https://gstatic.loli.net" crossorigin />
    <link href="https://fonts.loli.net/css2?family=Press+Start+2P&display=swap" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/nes.css@latest/css/nes.min.css" rel="stylesheet" />
    <style>
        * { box-sizing: border-box; }

        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 40%, #0f3460 100%);
            font-family: 'Press Start 2P', "PingFang SC", "Microsoft YaHei", sans-serif;
            color: #e0e0e0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }

        .login-wrap {
            width: 100%;
            max-width: 460px;
        }

        .logo-row {
            text-align: center;
            margin-bottom: 28px;
        }
        .logo-row .logo-icon {
            font-size: 2.5rem;
            display: block;
            margin-bottom: 10px;
        }
        .logo-row .logo-title {
            font-size: 0.85rem;
            color: #fbbf24;
            text-shadow: 0 0 10px rgba(251,191,36,0.4);
        }
        .logo-row .logo-sub {
            font-size: 0.55rem;
            color: #94a3b8;
            margin-top: 6px;
        }

        /* ── NES container overrides ── */
        .nes-container {
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-color: rgba(255,255,255,0.12);
            border-radius: 6px;
            color: #e0e0e0;
        }
        .nes-container.with-title > .title {
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            color: #fbbf24;
        }
        .nes-container.is-rounded {
            border-color: #e76e55;
            background: rgba(231,110,85,0.1);
        }

        h1 {
            font-size: 0.85rem;
            margin-bottom: 6px;
            text-align: center;
            color: #e0e0e0;
        }
        .sub {
            font-size: 0.55rem;
            color: #94a3b8;
            margin-bottom: 24px;
            text-align: center;
            line-height: 1.8;
        }

        .field-group {
            margin-bottom: 18px;
        }
        .field-group label {
            display: block;
            font-size: 0.55rem;
            color: #94a3b8;
            margin-bottom: 8px;
        }
        .field-group .nes-input {
            width: 100%;
            font-family: 'Press Start 2P', "PingFang SC", "Microsoft YaHei", sans-serif;
            font-size: 0.6rem;
            background: rgba(255,255,255,0.08);
            color: #e0e0e0;
            border-color: rgba(255,255,255,0.15);
        }
        .field-group .nes-input::placeholder {
            color: #64748b;
        }

        .remember-row {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 24px;
            font-size: 0.5rem;
        }
        .remember-row label {
            color: #94a3b8;
            cursor: pointer;
            line-height: 1.8;
        }

        .submit-btn {
            width: 100%;
            font-family: 'Press Start 2P', "PingFang SC", "Microsoft YaHei", sans-serif;
            font-size: 0.6rem;
        }
    </style>
</head>
<body>
    <div class="login-wrap">
        <div class="logo-row">
            <span class="logo-icon">🗺️</span>
            <div class="logo-title">MazeQuest</div>
            <div class="logo-sub">迷境探索 · 在线冒险游戏</div>
        </div>

        <div class="nes-container with-title">
            <p class="title">玩家登录</p>

            <h1>欢迎回来！</h1>
            <p class="sub">登录后开始你的迷境冒险之旅</p>

            <div th:if="${error}" class="nes-container is-rounded" style="margin-bottom:18px;border-color:#e76e55;">
                <p style="font-size:0.4rem;color:#e76e55;">⚠ <span th:text="${error}"></span></p>
            </div>

            <form method="post" action="/login">
                <div class="field-group">
                    <label for="username">游戏账号</label>
                    <input type="text" id="username" name="username"
                           class="nes-input" placeholder="请输入账号"
                           autocomplete="username" autofocus />
                </div>

                <div class="field-group">
                    <label for="password">密码</label>
                    <input type="password" id="password" name="password"
                           class="nes-input" placeholder="请输入密码"
                           autocomplete="current-password" />
                </div>

                <div class="remember-row">
                    <label for="rememberMe" style="display:flex;align-items:center;gap:12px;">
                        <input type="checkbox" id="rememberMe" name="rememberMe"
                               value="true" class="nes-checkbox" />
                        <span>记住登录状态（14 天内免密进入）</span>
                    </label>
                </div>

                <button type="submit" class="nes-btn is-primary submit-btn">▶ 开始冒险</button>
            </form>
        </div>
    </div>
</body>
</html>
