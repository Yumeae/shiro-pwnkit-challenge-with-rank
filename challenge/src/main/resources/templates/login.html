<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>登录 — Shiro Challenge</title>
    <style>
        :root {
            --bg:     #f5f0e8;
            --white:  #ffffff;
            --black:  #111827;
            --orange: #e07b39;
            --border: #111827;
        }
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background-color: var(--bg);
            background-image: radial-gradient(circle, rgba(0,0,0,0.13) 1px, transparent 1px);
            background-size: 22px 22px;
            font-family: -apple-system, BlinkMacSystemFont, 'Noto Sans SC',
                         'PingFang SC', 'Microsoft YaHei', sans-serif;
            min-height: 100vh;
            display: flex; align-items: center; justify-content: center;
            padding: 24px;
        }

        .card {
            background: var(--white);
            border: 2.5px solid var(--border);
            box-shadow: 6px 6px 0 var(--border);
            padding: 40px;
            width: 100%; max-width: 420px;
        }

        .logo-row {
            display: flex; align-items: center; gap: 12px;
            margin-bottom: 28px;
        }
        .logo-icon {
            width: 42px; height: 42px;
            background: var(--orange); border: 2px solid var(--border);
            display: flex; align-items: center; justify-content: center;
            font-size: 1.2rem; flex-shrink: 0;
        }
        .logo-text { font-weight: 900; font-size: 1.1rem; }

        h1 { font-size: 1.55rem; font-weight: 900; margin-bottom: 6px; }
        .sub { font-size: 0.8rem; color: #6b7280; margin-bottom: 28px; font-family: monospace; }

        .error-box {
            background: #fef2f2; border: 2px solid #ef4444;
            padding: 10px 14px; font-size: 0.82rem; color: #dc2626;
            margin-bottom: 20px; display: flex; align-items: center; gap: 8px;
        }

        label { display: block; font-weight: 700; font-size: 0.82rem; margin-bottom: 6px; }

        input[type="text"],
        input[type="password"] {
            width: 100%; padding: 10px 14px;
            border: 2px solid var(--border); background: var(--white);
            font-size: 0.9rem; font-family: inherit; outline: none;
            margin-bottom: 18px; transition: box-shadow 0.15s;
        }
        input[type="text"]:focus,
        input[type="password"]:focus { box-shadow: 3px 3px 0 var(--orange); }

        .remember-row {
            display: flex; align-items: center; gap: 8px;
            margin-bottom: 24px; font-size: 0.82rem;
        }
        input[type="checkbox"] { width: 16px; height: 16px; accent-color: var(--orange); cursor: pointer; }
        .remember-row label { margin-bottom: 0; font-weight: 400; }

        .btn {
            width: 100%; padding: 12px;
            background: var(--orange); border: 2px solid var(--border);
            box-shadow: 3px 3px 0 var(--border);
            color: #fff; font-size: 0.95rem; font-weight: 700;
            font-family: inherit; cursor: pointer;
            transition: transform 0.1s, box-shadow 0.1s;
        }
        .btn:hover { transform: translate(2px, 2px); box-shadow: 1px 1px 0 var(--border); }
        .btn:active { transform: translate(3px, 3px); box-shadow: none; }

        .hint {
            margin-top: 20px; padding: 12px 14px;
            background: #fffbeb; border: 1.5px solid #fcd34d;
            font-size: 0.75rem; color: #92400e; line-height: 1.8;
        }
        .hint strong { font-weight: 700; }
    </style>
</head>
<body>
    <div class="card">
        <div class="logo-row">
            <div class="logo-icon">⚡</div>
            <span class="logo-text">Shiro Challenge</span>
        </div>

        <h1>靶场登录</h1>
        <div class="sub">CVE-2016-4437 · CVE-2021-4034</div>

        <div th:if="${error}" class="error-box">
            <span>⚠</span>
            <span th:text="${error}"></span>
        </div>

        <form method="post" action="/login">
            <label for="username">用户名</label>
            <input type="text" id="username" name="username" autocomplete="off" autofocus />

            <label for="password">密码</label>
            <input type="password" id="password" name="password" />

            <div class="remember-row">
                <input type="checkbox" id="rememberMe" name="rememberMe" value="true" />
                <label for="rememberMe">记住我 (Remember Me)</label>
            </div>

            <button type="submit" class="btn">登 录 →</button>
        </form>

        <div class="hint">
            💡 <strong>提示：</strong>启用「记住我」后，服务器会在响应中设置 RememberMe Cookie，
            可利用 Shiro 默认密钥伪造恶意序列化 Payload 实现 RCE。
        </div>
    </div>
</body>
</html>
